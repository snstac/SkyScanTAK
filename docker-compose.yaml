version: "3"

networks:
    skyscan:
      driver: bridge
      driver_opts:
        com.docker.network.driver.mtu: 900

services:

  mqtt:
    networks:
      - skyscan
    image: iqtlabs/edgetech-mqtt-dev:latest
    # Host bindings: use 1884/9002 if 1883/9001 are already in use on the host
    ports:
      - "1884:1883"
      - "9002:9001"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10M"
        max-file: "10"

  object-ledger:
    networks:
      - skyscan
    image: iqtlabs/edgetech-object-ledger:v1.2
    restart: unless-stopped
    depends_on: 
      - mqtt
    environment:
      # Publish only to raw ADS-B ledger; skyscan-c2 consumes merged topic (see cot-track-fusion)
      LEDGER_TOPIC: ${OBJECT_LEDGER_TOPIC}
    env_file:
      - .env
      - object-ledger.env

  cot-track-fusion:
    networks:
      - skyscan
    build:
      context: ./cot/track_fusion
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mqtt
      - object-ledger
    env_file:
      - .env
      - cot-bridge.env
      - cot-track-fusion.env
    volumes:
      # Same enrollment + client certs as cot-bridge (shared COT_URL)
      - ./data/cot-bridge-pytak:/root/.pytak

  controller:
    networks:
      - skyscan
    build:
      context: ./axis-ptz-controller
      dockerfile: Dockerfile
    volumes:
      - ./data/to_sort:/data/to_sort
    restart: unless-stopped
    depends_on:
      - mqtt
    env_file:
      - .env
      - axis-ptz-controller.env

  dump1090-json:
    networks:
      - skyscan
    image: iqtlabs/edgetech-dump1090-json:v1.1
    restart: unless-stopped
    depends_on:
      - mqtt
    logging:
      driver: "json-file"
      options:
        max-size: "10M"
        max-file: "10"
    env_file:
      - .env
      - ./dump1090-json.env

  cot-bridge:
    networks:
      - skyscan
    build:
      context: ./cot/bridge
      dockerfile: Dockerfile
    volumes:
      # PyTAK TAK enrollment client cert + passphrase cache (~/.pytak)
      - ./data/cot-bridge-pytak:/root/.pytak
    restart: unless-stopped
    depends_on:
      - mqtt
    env_file:
      - .env
      - cot-bridge.env

  skyscan-c2:
    networks:
      - skyscan
    build:
      context: ./skyscan-c2
      dockerfile: Dockerfile
    volumes:
      - ./data/mapping:/data/mapping
    restart: unless-stopped
    depends_on:
      - mqtt
      - object-ledger
      - cot-track-fusion
    logging:
      driver: "json-file"
      options:
        max-size: "10M"
        max-file: "10"
    env_file:
      - .env
      - skyscan-c2.env

  video-gateway:
    networks:
      - skyscan
    build:
      context: ./video
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mqtt
    env_file:
      - .env
      - video-gateway.env
    # ATAK / UAS: MPEG-TS (H.264 + KLV) over TCP — see video/README.md § ATAK
    ports:
      - "8556:8556"

  # occlusion-mapper:
  #   networks:
  #     - skyscan
  #   image: iqtlabs/edgetech-occlusion-mapper:v1.0
  #   volumes:
  #     - ./data/mapping:/data/mapping
